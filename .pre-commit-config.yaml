repos:

- repo: local
  hooks:
    - id: swift-format
      name: swift-format
      language: system
      entry: swift-format format --in-place --configuration .swift-format --recursive .
      require_serial: true
      types: [swift]

- repo: https://github.com/cheshirekow/cmake-format-precommit
  rev: v0.6.10
  hooks:
    - id: cmake-format

- repo: https://github.com/lycheeverse/lychee.git
  rev: lychee-v0.24.2
  hooks:
    - id: lychee
      args:
        - --no-progress
        - --offline
      types: [markdown]
