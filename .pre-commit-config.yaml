repos:

- repo: local
  hooks:
    - id: swift-format
      name: swift-format
      language: system
      entry: swift-format format --in-place --configuration .swift-format --recursive .
      require_serial: true
      types: [swift]

    - id: check-markdown-links
      name: check markdown links
      language: system
      entry: python3 tools/check_links.py
      require_serial: true
      types: [markdown]

- repo: https://github.com/cheshirekow/cmake-format-precommit
  rev: v0.6.10
  hooks:
    - id: cmake-format
